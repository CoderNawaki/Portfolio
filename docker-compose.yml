version: '3.8'

services:
  portfolio-app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - PORTFOLIO_ADMIN_USERNAME=${PORTFOLIO_ADMIN_USERNAME}
      - PORTFOLIO_ADMIN_PASSWORD=${PORTFOLIO_ADMIN_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/portfolio
      - SPRING_DATASOURCE_USERNAME=portfolio_user
      - SPRING_DATASOURCE_PASSWORD=portfolio_pass
    networks:
      - portfolio-network
    depends_on:
      - db
      - prometheus

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=portfolio
      - POSTGRES_USER=portfolio_user
      - POSTGRES_PASSWORD=portfolio_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - portfolio-network
    depends_on:
      - portfolio-app

  grafana:
    image: grafana/grafana-oss
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - portfolio-network
    depends_on:
      - prometheus

networks:
  portfolio-network:
    driver: bridge

volumes:
  grafana-storage:
  postgres-data:
