<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="auth-body">
<main class="auth-shell">
    <section class="auth-panel">
        <p class="eyebrow">Admin Access</p>
        <h1>Sign in to review contact submissions</h1>
        <p class="auth-summary">
            Use the configured portfolio admin credentials to access the protected inbox and manage recruiter follow-up.
        </p>

        <p th:if="${param.error}" class="auth-message auth-message-error">
            Sign-in failed. Check the username and password and try again.
        </p>
        <p th:if="${param.logout}" class="auth-message auth-message-success">
            You have been signed out.
        </p>

        <form class="auth-form" th:action="@{/login}" method="post">
            <label>
                <span>Username</span>
                <input type="text" name="username" autocomplete="username" required>
            </label>
            <label>
                <span>Password</span>
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button class="button button-primary" type="submit">Sign in</button>
        </form>

        <a class="auth-home-link" th:href="@{/}">Return to portfolio</a>
    </section>
</main>
</body>
</html>
