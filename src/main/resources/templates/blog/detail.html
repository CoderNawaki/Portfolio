<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>

<main>
    <section class="section blog-detail-section">
        <nav class="breadcrumb">
            <a th:href="@{/blog}">Blog</a>
            <span th:text="' / ' + ${article.title}">Article title</span>
        </nav>

        <article class="blog-article">
            <header class="blog-article-header">
                <h1 th:text="${article.title}">Article title</h1>
                <div class="blog-article-meta">
                    <time th:datetime="${article.publishedAt}" th:text="${#temporals.format(article.publishedAt, 'MMM d, yyyy')}">Date</time>
                    <span th:if="${article.tags != null and !article.tags.isEmpty()}">
                        <span class="blog-tag" th:each="tag : ${#strings.listSplit(article.tags, ',')}" th:text="${#strings.trim(tag)}">tag</span>
                    </span>
                </div>
            </header>

            <div class="blog-article-content" th:utext="${htmlContent}">
                Rendered HTML content
            </div>
        </article>

        <div class="engagement-bar">
            <button class="engagement-btn like-btn" th:attr="data-slug=${article.slug}, data-liked=${liked ? 'true' : 'false'}" type="button" aria-label="Like this article">
                <svg class="like-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span class="like-count" th:text="${likeCount}">0</span>
                <span class="like-label">Likes</span>
            </button>

            <div class="share-bar">
                <span class="share-label">Share</span>
                <button class="share-btn" data-share="copy" type="button" aria-label="Copy link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                </button>
                <button class="share-btn" data-share="twitter" type="button" aria-label="Share on Twitter">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                </button>
                <button class="share-btn" data-share="linkedin" type="button" aria-label="Share on LinkedIn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="comments-section" id="comments">
            <h2 class="comments-heading">Comments</h2>
            <div class="comment-tree" th:unless="${#lists.isEmpty(comments)}">
                <div th:each="comment : ${comments}" class="comment">
                    <div class="comment-body">
                        <div class="comment-meta">
                            <strong class="comment-author" th:text="${comment.author}">Author</strong>
                            <time class="comment-time" th:datetime="${comment.createdAt}" th:text="${#temporals.format(comment.createdAt, 'MMM d, yyyy HH:mm')}">Date</time>
                        </div>
                        <div class="comment-content" th:text="${comment.content}">Comment text</div>
                        <div class="comment-actions">
                            <button class="engagement-btn comment-like-btn" th:attr="data-comment-id=${comment.id}, data-liked=${comment.likedByCurrentUser ? 'true' : 'false'}" type="button" aria-label="Like this comment">
                                <svg class="like-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                                </svg>
                                <span class="like-count" th:text="${comment.likeCount}">0</span>
                            </button>
                            <button class="reply-toggle-btn" th:attr="data-comment-id=${comment.id}" type="button">Reply</button>
                        </div>
                        <div class="reply-form-wrapper" th:id="'reply-form-' + ${comment.id}" style="display:none;">
                            <form class="comment-form" th:attr="data-parent-id=${comment.id}, data-slug=${article.slug}">
                                <input type="text" class="comment-author-input" placeholder="Your name" required maxlength="100">
                                <textarea class="comment-content-input" placeholder="Write a reply..." required maxlength="2000"></textarea>
                                <div class="comment-form-actions">
                                    <button type="submit" class="button button-primary comment-submit-btn">Post Reply</button>
                                    <button type="button" class="button button-secondary reply-cancel-btn">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="comment-replies" th:if="${not #lists.isEmpty(comment.replies)}">
                        <div th:each="reply : ${comment.replies}" class="comment">
                            <div class="comment-body">
                                <div class="comment-meta">
                                    <strong class="comment-author" th:text="${reply.author}">Author</strong>
                                    <time class="comment-time" th:datetime="${reply.createdAt}" th:text="${#temporals.format(reply.createdAt, 'MMM d, yyyy HH:mm')}">Date</time>
                                </div>
                                <div class="comment-content" th:text="${reply.content}">Reply text</div>
                                <div class="comment-actions">
                                    <button class="engagement-btn comment-like-btn" th:attr="data-comment-id=${reply.id}, data-liked=${reply.likedByCurrentUser ? 'true' : 'false'}" type="button" aria-label="Like this comment">
                                        <svg class="like-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                                        </svg>
                                        <span class="like-count" th:text="${reply.likeCount}">0</span>
                                    </button>
                                    <button class="reply-toggle-btn" th:attr="data-comment-id=${reply.id}" type="button">Reply</button>
                                </div>
                                <div class="reply-form-wrapper" th:id="'reply-form-' + ${reply.id}" style="display:none;">
                                    <form class="comment-form" th:attr="data-parent-id=${reply.id}, data-slug=${article.slug}">
                                        <input type="text" class="comment-author-input" placeholder="Your name" required maxlength="100">
                                        <textarea class="comment-content-input" placeholder="Write a reply..." required maxlength="2000"></textarea>
                                        <div class="comment-form-actions">
                                            <button type="submit" class="button button-primary comment-submit-btn">Post Reply</button>
                                            <button type="button" class="button button-secondary reply-cancel-btn">Cancel</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="comment-empty" th:if="${#lists.isEmpty(comments)}">
                <p>No comments yet. Be the first to share your thoughts!</p>
            </div>
            <div class="add-comment">
                <h3>Leave a Comment</h3>
                <form class="comment-form" id="top-level-comment-form" th:attr="data-slug=${article.slug}">
                    <input type="text" class="comment-author-input" placeholder="Your name" required maxlength="100">
                    <textarea class="comment-content-input" placeholder="Share your thoughts..." required maxlength="2000"></textarea>
                    <div class="comment-form-actions">
                        <button type="submit" class="button button-primary comment-submit-btn">Post Comment</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="blog-back-link">
            <a th:href="@{/blog}">&larr; Back to Blog</a>
        </div>
    </section>
</main>

<button id="scrollToTopBtn" type="button" aria-label="Scroll to top">Top</button>

<footer th:replace="~{fragments :: footer}"></footer>

<script th:src="@{/script.js}"></script>
<script th:src="@{/engagement.js}"></script>
</body>
</html>
