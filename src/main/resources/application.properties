spring.application.name=portfolio-app
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:portfoliodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

portfolio.admin.username=${PORTFOLIO_ADMIN_USERNAME}
portfolio.admin.password=${PORTFOLIO_ADMIN_PASSWORD}

portfolio.display-name=Lama Nawaraj
portfolio.role=Full Stack Developer
portfolio.location=Working mainly in Japan
portfolio.site-url=${PORTFOLIO_SITE_URL:http://localhost:8081}
portfolio.github-url=https://github.com/CoderNawaki
portfolio.email=lama.nawraj00@gmail.com
portfolio.resume-label=Resume available on request
portfolio.availability=Open to full stack opportunities focused on Java, Spring Boot, and product delivery.

portfolio.contact.notification-email=${PORTFOLIO_CONTACT_NOTIFICATION_EMAIL:lama.nawraj00@gmail.com}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.otlp.metrics.export.enabled=false
management.opentelemetry.tracing.sampler=always-on
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

portfolio.focus-areas=Java and Spring Boot backend delivery, Frontend implementation with HTML, CSS, JavaScript, and React, Design documents, testing, and release-oriented development, Japanese and English communication in engineering environments
portfolio.proof-points=Working mainly in Japan, Bridge engineer experience, Backend-first full stack positioning, Documentation and testing included in delivery
portfolio.bio=Professional Java developer working mainly in Japan. Experienced in writing design documents, development, and testing. Strong language proficiency in Japanese, with English as a secondary language. Experienced in bridge engineer work and committed to learning new technology every day.

