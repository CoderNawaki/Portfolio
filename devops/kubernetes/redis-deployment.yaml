apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-redis
  template:
    metadata:
      labels:
        app: portfolio-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - redis-server
            - --appendonly
            - "yes"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping
            initialDelaySeconds: 15
            periodSeconds: 20
